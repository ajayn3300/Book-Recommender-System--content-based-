<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recommended Books</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #011c3a 0%, #1b1901 100%);
            margin: 0;
            padding: 20px;
            color: #fff;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
        }
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .book {
            background: #fff;
            color: #333;
            border-radius: 12px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.25);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .book:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.35);
        }
        .book img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .book:hover img {
            transform: scale(1.05);
        }
        .book h3 {
            margin: 12px 10px 6px;
            font-size: 1rem;
            font-weight: bold;
            color: #222;
        }
        .book p {
            margin: 0 10px 12px;
            font-size: 0.9rem;
            color: #555;
        }
        .back-link {
            display: block;
            margin: 30px auto 0;
            text-align: center;
            font-weight: bold;
            text-decoration: none;
            color: #fff;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 8px;
            transition: background 0.3s ease;
            width: fit-content;
        }
        .back-link:hover {
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <h1>📚 Similar books like "{{ query_title }}"</h1>
    <div class="books-grid">
        {% for book in books %}
            <div class="book">
                <img src="{{ book.coverImg or '/static/placeholder.png' }}" alt="{{ book.title }}">
                <h3>{{ book.title }}</h3>
                <p>{{ book.author }}</p>
            </div>
        {% endfor %}
    </div>
    <a href="/" class="back-link">⬅ Back to Search</a>
</body>
</html>
